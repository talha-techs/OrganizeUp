name: Deploy

on:
  push:
    branches:
      - main

# Only allow one deployment to run at a time; cancel the previous one if a
# new push arrives while a deploy is in progress.
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  # ── 1. CI gate ────────────────────────────────────────────────────────────
  ci:
    name: CI Gate (Lint & Build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install server dependencies
        run: npm ci --prefer-offline
        working-directory: server

      - name: Install client dependencies
        run: npm ci --prefer-offline
        working-directory: client

      - name: Lint client
        run: npm run lint
        working-directory: client

      - name: Build client
        run: npm run build
        working-directory: client

  # ── 2. Deploy backend → Render ────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Render)
    runs-on: ubuntu-latest
    needs: ci
    environment: production

    steps:
      - name: Trigger Render deploy hook
        # Set RENDER_DEPLOY_HOOK_URL in your repository's Actions secrets.
        # Get the URL from: Render Dashboard → Service → Settings → Deploy Hook
        run: |
          curl -fsSL --retry 3 --retry-delay 5 \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  # ── 3. Deploy frontend → Vercel ───────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: ci
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment & project settings
        # Set VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID in your
        # repository's Actions secrets.
        # Retrieve them from:
        #   VERCEL_TOKEN     → vercel.com/account/tokens
        #   VERCEL_ORG_ID    → vercel.com/<team>/settings (or personal account settings)
        #   VERCEL_PROJECT_ID → vercel.com/<team>/<project>/settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build for production via Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy pre-built output to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
